services:

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: chat_app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - chat-network
        depends_on:
            db:
                condition: service_healthy



    db:
        image: mysql:8.4
        container_name: chat_mysql
        command:
                - --log-bin-trust-function-creators=1
                - --slow-query-log=1
                - --long-query-time=0.01
                - --slow-query-log-file=/var/lib/mysql/slow.log
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: chat-app
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            interval: 5s
            timeout: 5s
            retries: 10

        ports:
            - "3307:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        networks:
            - chat-network


    nginx:
        image: nginx:latest
        container_name: chat_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - chat-network

    vite:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: chat_vite
        working_dir: /var/www
        volumes:
            - ./:/var/www
        entrypoint: []
        command: npm run dev -- --host 0.0.0.0
        ports:
            - "5173:5173"
        networks:
            - chat-network


    reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: chat_reverb
        working_dir: /var/www
        volumes:
            - ./:/var/www
        entrypoint: []
        command: php artisan reverb:start
        ports:
            - "8081:8080"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - chat-network

networks:
    chat-network:


volumes:
    mysql-data:
