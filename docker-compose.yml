services:

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            -   db
        networks:
            - app-network
        environment:
            APP_ROLE: app

    web:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - app-network

    db:
        image: mysql:8.0
        restart: always
        environment:
            MYSQL_DATABASE: todo_api
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: user
            MYSQL_PASSWORD: password
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - app-network

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        command: php artisan queue:work --tries=3 --verbose
        depends_on:
            - db
            - app
        restart: unless-stopped
        networks:
            - app-network
        environment:
            APP_ROLE: queue

volumes:
    dbdata:

networks:
    app-network:
