services:

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile

        container_name: todo_app

        working_dir: /var/www

        volumes:
            - ./:/var/www

        user: "1000:1000"

        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        env_file:
            - .env

        networks:
            - app-network

        environment:
            HOME: /tmp
            APP_ROLE: app


    web:
        image: nginx:alpine

        container_name: todo_nginx

        ports:
            - "8082:80"

        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

        depends_on:
            - app

        networks:
            - app-network



    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile

        container_name: todo_queue

        working_dir: /var/www

        volumes:
            - ./:/var/www

        user: "1000:1000"

        entrypoint: ""

        command:
            php artisan queue:work --tries=3 --verbose

        depends_on:
            - app
            - redis

        env_file:
            - .env
        restart: unless-stopped

        networks:
            - app-network

        environment:
            HOME: /tmp
            APP_ROLE: queue


    kafka-consumer:
        build:
            context: .
            dockerfile: docker/php/Dockerfile

        container_name: todo_kafka_consumer

        working_dir: /var/www

        volumes:
            - ./:/var/www

        user: "1000:1000"

        entrypoint: ""
        env_file:
            - .env
        command:
            php artisan kafka:consume

        depends_on:
            - app
            - kafka

        restart:
            unless-stopped

        networks:
            - app-network

        environment:
            HOME: /tmp
            APP_ROLE: kafka



    reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile

        container_name: todo_reverb

        working_dir: /var/www

        volumes:
            - ./:/var/www

        user: "1000:1000"

        entrypoint: ""

        command:
            php artisan reverb:start --host=0.0.0.0

        ports:
            - "8080:8080"

        depends_on:
            - app

        restart:
            unless-stopped

        networks:
            - app-network
        env_file:
            - .env
        environment:
            HOME: /tmp
            APP_ROLE: reverb


    db:
        image: mysql:8.0
        container_name: todo_mysql
        restart: always
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: todo_api

            MYSQL_ROOT_PASSWORD: root

            MYSQL_USER: user

            MYSQL_PASSWORD: password
        volumes:
            - dbdata:/var/lib/mysql

        healthcheck:
            test:
              [
                  "CMD",
                  "mysqladmin",
                  "ping",
                  "-h",
                  "localhost"
              ]
            timeout:
                5s
            retries:
                10

        networks:
            - app-network

    redis:
        image: redis:latest
        container_name: todo_redis
        restart: always
        ports:
            - "6379:6379"

        volumes:
            - redis_data:/data

        networks:
            - app-network

    kafka:
        image: apache/kafka:latest
        container_name: kafka
        ports:
            - "9092:9092"

        environment:
            KAFKA_NODE_ID:
                1

            KAFKA_PROCESS_ROLES:
                broker,controller

            KAFKA_LISTENERS:
                PLAINTEXT://:9092,CONTROLLER://:9093

            KAFKA_ADVERTISED_LISTENERS:
                PLAINTEXT://kafka:9092

            KAFKA_CONTROLLER_LISTENER_NAMES:
                CONTROLLER

            KAFKA_CONTROLLER_QUORUM_VOTERS:
                1@kafka:9093

            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:
                1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:
                1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:
                1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:
                0
            KAFKA_NUM_PARTITIONS:
                3

        volumes:
            - kafka_data:/var/lib/kafka/data

        networks:
            - app-network

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: kafka_ui
        ports:
            - "8083:8080"

        depends_on:
            - kafka

        environment:
            KAFKA_CLUSTERS_0_NAME:
                local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:
                kafka:9092

        networks:
            - app-network

volumes:
    dbdata:
    kafka_data:
    redis_data:

networks:
    app-network:
