services:

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        user: "1000:1000"
        depends_on:
            - db
        networks:
            - app-network
        env_file:
            - .env
        environment:
            HOME: /tmp

    web:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - app-network

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        user: "1000:1000"
        entrypoint: ""
        command: php artisan queue:work --tries=3 --verbose
        depends_on:
            - app
        restart: unless-stopped
        networks:
            - app-network
        env_file:
            - .env
        environment:
            HOME: /tmp

    kafka-consumer:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www
        volumes:
            - ./:/var/www
        user: "1000:1000"
        entrypoint: ""
        command: php artisan kafka:consume
        depends_on:
            - app
            - kafka
        restart: unless-stopped
        networks:
            - app-network
        env_file:
            - .env
        environment:
            HOME: /tmp

    db:
        image: mysql:8.0
        ports:
            -   "3306:3306"
        restart: always
        environment:
            MYSQL_DATABASE: todo_api
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: user
            MYSQL_PASSWORD: password
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - app-network

    kafka:
        image: apache/kafka:latest
        container_name: kafka
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        volumes:
            - kafka_data:/var/lib/kafka/data
        networks:
            - app-network


volumes:
    dbdata:
    kafka_data:

networks:
    app-network:
